version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse_dev_password
      POSTGRES_DB: pulse_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pulse -d pulse_dev']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: pulse-postgres-data
