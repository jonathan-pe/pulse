name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run typecheck and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install -w

      - name: Typecheck
        run: pnpm -w run typecheck

      - name: Run API tests
        run: pnpm -w -s exec -C apps/api pnpm test
        env:
          CI: true
